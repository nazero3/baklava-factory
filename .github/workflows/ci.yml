name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mvp_backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mvp_backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: mvp_backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Ruff lint
        run: ruff check .

      - name: Bandit security scan
        run: bandit -r app
