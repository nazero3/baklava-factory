<!doctype html>
<html lang="en" data-i18n-doctitle="products.title">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products — Baklava Factory</title>
  <script>(function(){var l=localStorage.getItem('baklava_lang')||'en';document.documentElement.lang=l;document.documentElement.dir=l==='ar'?'rtl':'ltr';})();</script>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
  <header id="app-nav" class="app-nav"></header>

  <main class="app-main">
    <div class="page-header">
      <h1 data-i18n="products.title">Products</h1>
      <p data-i18n="products.subtitle">Define raw materials and finished goods.</p>
    </div>

    <div class="card">
      <h2 data-i18n="products.add">Add product</h2>
      <form id="product-form">
        <div class="grid2">
          <div class="field">
            <label for="code" data-i18n="common.code">Code</label>
            <input id="code" type="text" placeholder="RM-FLOUR" required minlength="2" />
          </div>
          <div class="field">
            <label for="name" data-i18n="common.name">Name</label>
            <input id="name" type="text" placeholder="Flour" required minlength="2" />
          </div>
        </div>
        <div class="grid2">
          <div class="field">
            <label for="category" data-i18n="products.category">Category</label>
            <select id="category" required>
              <option value="raw" data-i18n="products.category.raw">Raw material</option>
              <option value="finished" data-i18n="products.category.finished">Finished good</option>
            </select>
          </div>
          <div class="field">
            <label for="reorder_level" data-i18n="products.reorder_level">Reorder level (kg)</label>
            <input id="reorder_level" type="number" step="0.001" min="0" value="0" />
            <p class="help" data-i18n="products.reorder_help">Low-stock alert triggers below this quantity. 0 disables it.</p>
          </div>
        </div>
        <button type="submit" data-i18n="common.create">Create</button>
      </form>
      <div id="toast" class="toast"></div>
    </div>

    <div class="card section-gap">
      <h2 data-i18n="products.list">Product catalog</h2>
      <div class="field" style="max-width:240px;">
        <select id="filter">
          <option value="" data-i18n="products.filter_all">All categories</option>
          <option value="raw" data-i18n="products.category.raw">Raw material</option>
          <option value="finished" data-i18n="products.category.finished">Finished good</option>
        </select>
      </div>
      <div class="data-table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th data-i18n="common.id">ID</th>
              <th data-i18n="common.code">Code</th>
              <th data-i18n="common.name">Name</th>
              <th data-i18n="products.category">Category</th>
              <th data-i18n="products.reorder_level">Reorder level</th>
              <th data-i18n="products.factory_stock">Factory stock (kg)</th>
            </tr>
          </thead>
          <tbody id="product-tbody">
            <tr><td colspan="6" class="empty" data-i18n="common.loading">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="/static/js/i18n.js"></script>
  <script src="/static/js/auth_client.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/shell.js"></script>
  <script>
    BaklavaShell.initShell("products");
    const C = BaklavaComponents;
    const t = (k) => BaklavaI18n.t(k);
    const toast = document.getElementById("toast");
    const tbody = document.getElementById("product-tbody");
    const filter = document.getElementById("filter");

    function factoryStock(inventory, productId) {
      const row = inventory.find((r) => r.location_type === "factory" && r.product_id === productId);
      return row ? row.quantity_kg : 0;
    }

    async function loadCatalog() {
      try {
        const cat = filter.value;
        const products = await C.loadProducts(cat || undefined);
        let inventory = [];
        try { inventory = await BaklavaApi.get("/inventory"); } catch { inventory = []; }
        C.renderRows(
          tbody,
          products,
          [
            { render: (p) => C.escapeHtml(p.id) },
            { render: (p) => C.escapeHtml(p.code) },
            { render: (p) => C.escapeHtml(p.name) },
            { render: (p) => t("products.category." + p.category) },
            { render: (p) => C.fmtNum(p.reorder_level) },
            { render: (p) => C.fmtNum(factoryStock(inventory, p.id)) },
          ],
          t("products.empty"),
          6
        );
      } catch (err) {
        C.renderRows(tbody, [], new Array(6).fill({}), err.message, 6);
      }
    }

    document.getElementById("product-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const body = {
        code: document.getElementById("code").value.trim(),
        name: document.getElementById("name").value.trim(),
        category: document.getElementById("category").value,
        unit: "kg",
        reorder_level: Number(document.getElementById("reorder_level").value) || 0,
      };
      try {
        const data = await BaklavaApi.post("/products", body);
        C.toast(toast, `${t("products.created")} (ID ${data.id})`, true);
        const key = body.category === "finished" ? "baklava_last_finished_product_id" : "baklava_last_raw_product_id";
        localStorage.setItem(key, data.id);
        document.getElementById("code").value = "";
        document.getElementById("name").value = "";
        document.getElementById("reorder_level").value = "0";
        await loadCatalog();
      } catch (err) {
        C.toast(toast, err.message, false);
      }
    });

    filter.addEventListener("change", loadCatalog);
    loadCatalog();
  </script>
</body>
</html>
