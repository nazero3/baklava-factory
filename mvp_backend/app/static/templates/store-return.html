<!doctype html>
<html lang="en" data-i18n-doctitle="store.title">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Store Movements — Baklava Factory</title>
  <script>(function(){var l=localStorage.getItem('baklava_lang')||'en';document.documentElement.lang=l;document.documentElement.dir=l==='ar'?'rtl':'ltr';})();</script>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
  <header id="app-nav" class="app-nav"></header>

  <main class="app-main">
    <div class="page-header">
      <h1 data-i18n="store.title">Store Movements</h1>
      <p data-i18n="store.subtitle">Record sales, returns, and waste at a store location.</p>
    </div>

    <div class="card">
      <form id="movement-form">
        <div class="grid2">
          <div class="field">
            <label for="store_id" data-i18n="common.store">Store</label>
            <select id="store_id" required></select>
          </div>
          <div class="field">
            <label for="product_id" data-i18n="common.product">Product</label>
            <select id="product_id" required></select>
          </div>
        </div>
        <div class="grid2">
          <div class="field">
            <label for="movement_type" data-i18n="store.movement_type">Movement type</label>
            <select id="movement_type" required>
              <option value="sale" data-i18n="type.sale">Sale</option>
              <option value="return" data-i18n="type.return">Return</option>
              <option value="waste" data-i18n="type.waste">Waste</option>
            </select>
          </div>
          <div class="field">
            <label for="qty_kg" data-i18n="common.qty_kg">Quantity (kg)</label>
            <input id="qty_kg" name="qty_kg" type="number" step="0.001" min="0.001" value="1" required />
          </div>
        </div>
        <button type="submit" data-i18n="store.post">Post movement</button>
      </form>
      <div id="toast" class="toast"></div>
      <div id="result" class="result-box"></div>
    </div>

    <div class="card section-gap">
      <h2 data-i18n="store.recent">Recent movements</h2>
      <div class="data-table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th data-i18n="common.id">ID</th>
              <th data-i18n="common.store">Store</th>
              <th data-i18n="common.product">Product</th>
              <th data-i18n="store.movement_type">Type</th>
              <th data-i18n="common.qty_kg">Qty (kg)</th>
              <th data-i18n="common.created_at">Created</th>
            </tr>
          </thead>
          <tbody id="movement-tbody">
            <tr><td colspan="6" class="empty" data-i18n="common.loading">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="/static/js/i18n.js"></script>
  <script src="/static/js/auth_client.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/shell.js"></script>
  <script>
    BaklavaShell.initShell("store-return");
    const C = BaklavaComponents;
    const t = (k) => BaklavaI18n.t(k);
    const toast = document.getElementById("toast");
    const result = document.getElementById("result");
    const tbody = document.getElementById("movement-tbody");

    function typeLabel(type) {
      const key = "type." + String(type).replace(/_$/, "");
      return t(key);
    }

    async function loadOptions() {
      try {
        await C.populateStoreSelect(document.getElementById("store_id"), {
          selected: localStorage.getItem("baklava_last_store_id"),
        });
        await C.populateProductSelect(document.getElementById("product_id"), {
          category: "finished",
          selected: localStorage.getItem("baklava_last_finished_product_id"),
        });
      } catch (err) {
        C.toast(toast, err.message, false);
      }
    }

    async function loadRecent() {
      try {
        const rows = await BaklavaApi.get("/store-movements");
        C.renderRows(
          tbody,
          rows,
          [
            { render: (r) => C.escapeHtml(r.id) },
            { render: (r) => C.escapeHtml(r.store_name || r.store_id) },
            { render: (r) => C.escapeHtml(r.product_name || r.product_id) },
            { render: (r) => C.escapeHtml(typeLabel(r.movement_type)) },
            { render: (r) => C.fmtNum(r.qty_kg) },
            { render: (r) => C.fmtDate(r.created_at) },
          ],
          t("store.empty"),
          6
        );
      } catch (err) {
        C.renderRows(tbody, [], new Array(6).fill({}), err.message, 6);
      }
    }

    document.getElementById("movement-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const storeId = Number(document.getElementById("store_id").value);
      const body = {
        product_id: Number(document.getElementById("product_id").value),
        movement_type: document.getElementById("movement_type").value,
        qty_kg: Number(document.getElementById("qty_kg").value),
      };
      if (!storeId || !body.product_id) {
        C.toast(toast, t("common.required"), false);
        return;
      }
      try {
        const data = await BaklavaApi.post(`/stores/${storeId}/movements`, body);
        C.toast(toast, `${t("store.posted")} (ID ${data.id})`, true);
        localStorage.setItem("baklava_last_store_id", storeId);
        localStorage.setItem("baklava_last_finished_product_id", body.product_id);
        C.renderResult(result, [
          { label: t("common.id"), value: data.id },
          { label: t("store.movement_type"), value: typeLabel(body.movement_type) },
          { label: t("common.qty_kg"), value: C.fmtNum(body.qty_kg) },
        ]);
        await loadRecent();
      } catch (err) {
        C.toast(toast, err.message, false);
        C.clearResult(result);
      }
    });

    loadOptions();
    loadRecent();
  </script>
</body>
</html>
