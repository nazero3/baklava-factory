<!doctype html>
<html lang="en" data-i18n-doctitle="recipes.title">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipes — Baklava Factory</title>
  <script>(function(){var l=localStorage.getItem('baklava_lang')||'en';document.documentElement.lang=l;document.documentElement.dir=l==='ar'?'rtl':'ltr';})();</script>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
  <header id="app-nav" class="app-nav"></header>

  <main class="app-main">
    <div class="page-header">
      <h1 data-i18n="recipes.title">Recipes</h1>
      <p data-i18n="recipes.subtitle">Define how much of each raw material is consumed per 1 kg of finished output.</p>
    </div>

    <div class="card">
      <form id="recipe-form">
        <div class="field">
          <label for="finished_id" data-i18n="recipes.finished">Finished product</label>
          <select id="finished_id" required></select>
        </div>
        <div id="ingredients"></div>
        <button type="button" class="btn-secondary" id="add-ingredient" data-i18n="recipes.add_ingredient">Add ingredient</button>
        <button type="submit" data-i18n="recipes.save">Save recipe</button>
      </form>
      <div id="toast" class="toast"></div>
    </div>

    <div class="card section-gap">
      <h2 data-i18n="recipes.list">Existing recipes</h2>
      <div class="data-table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th data-i18n="common.id">ID</th>
              <th data-i18n="recipes.finished">Finished product</th>
              <th data-i18n="recipes.ingredients">Ingredients</th>
            </tr>
          </thead>
          <tbody id="recipe-tbody">
            <tr><td colspan="3" class="empty" data-i18n="common.loading">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="/static/js/i18n.js"></script>
  <script src="/static/js/auth_client.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/shell.js"></script>
  <script>
    BaklavaShell.initShell("recipes");
    const C = BaklavaComponents;
    const t = (k) => BaklavaI18n.t(k);
    const toast = document.getElementById("toast");
    const ingredientsEl = document.getElementById("ingredients");
    const tbody = document.getElementById("recipe-tbody");
    let rawProducts = [];

    function addIngredientRow(selectedId, qty) {
      const row = document.createElement("div");
      row.className = "ingredient-row";
      row.innerHTML = `
        <div class="field" style="margin:0;">
          <label>${t("recipes.ingredient")}</label>
          <select class="ing-product"></select>
        </div>
        <div class="field" style="margin:0;">
          <label>${t("recipes.qty_per_kg")}</label>
          <input class="ing-qty" type="number" step="0.001" min="0.001" value="${qty || 0.5}" />
        </div>
        <button type="button" class="btn-remove">${t("recipes.remove")}</button>
      `;
      ingredientsEl.appendChild(row);
      C.fillSelect(row.querySelector(".ing-product"), rawProducts, {
        value: "id",
        label: (p) => `${p.name} (${p.code})`,
        selected: selectedId,
      });
      row.querySelector(".btn-remove").addEventListener("click", () => row.remove());
    }

    async function loadOptions() {
      try {
        await C.populateProductSelect(document.getElementById("finished_id"), {
          category: "finished",
          selected: localStorage.getItem("baklava_last_finished_product_id"),
        });
        rawProducts = await C.loadProducts("raw");
        addIngredientRow(localStorage.getItem("baklava_last_raw_product_id"));
      } catch (err) {
        C.toast(toast, err.message, false);
      }
    }

    async function loadRecipes() {
      try {
        const rows = await BaklavaApi.get("/recipes");
        C.renderRows(
          tbody,
          rows,
          [
            { render: (r) => C.escapeHtml(r.id) },
            { render: (r) => C.escapeHtml((r.finished_name || r.finished_product_id) + (r.finished_code ? ` (${r.finished_code})` : "")) },
            {
              render: (r) =>
                r.items
                  .map((it) => `${C.escapeHtml(it.ingredient_name || it.ingredient_product_id)}: ${C.fmtNum(it.qty_per_kg_output)}`)
                  .join("<br/>"),
            },
          ],
          t("recipes.empty"),
          3
        );
      } catch (err) {
        C.renderRows(tbody, [], new Array(3).fill({}), err.message, 3);
      }
    }

    document.getElementById("add-ingredient").addEventListener("click", () => addIngredientRow());

    document.getElementById("recipe-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const finishedId = Number(document.getElementById("finished_id").value);
      if (!finishedId) {
        C.toast(toast, t("common.required"), false);
        return;
      }
      const items = [];
      ingredientsEl.querySelectorAll(".ingredient-row").forEach((row) => {
        const id = Number(row.querySelector(".ing-product").value);
        const qty = Number(row.querySelector(".ing-qty").value);
        if (id && qty > 0) items.push({ ingredient_product_id: id, qty_per_kg_output: qty });
      });
      if (!items.length) {
        C.toast(toast, t("recipes.need_one"), false);
        return;
      }
      try {
        const data = await BaklavaApi.post("/recipes", { finished_product_id: finishedId, items });
        C.toast(toast, `${t("recipes.saved")} (${data.item_count})`, true);
        await loadRecipes();
      } catch (err) {
        C.toast(toast, err.message, false);
      }
    });

    loadOptions();
    loadRecipes();
  </script>
</body>
</html>
